<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Viewer</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
        canvas { display: block; }
        #loading {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif;
            background: rgba(0,0,0,0.5); padding: 5px 10px;
            border-radius: 5px; pointer-events: none;
            z-index: 100;
        }
        #info {
            position: absolute; bottom: 10px; right: 10px;
            color: #888; font-family: sans-serif; font-size: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">Waiting for model...</div>
    <div id="info">QuestGear 3D Engine | Three.js</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        const loader = new GLTFLoader();
        
        function loadModel(url) {
            console.log("Loading model from:", url);
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = 'Loading 3D model...';

            // Cache busting
            const finalUrl = url + "?t=" + new Date().getTime();

            loader.load(finalUrl, (gltf) => {
                // Remove existing models
                const toRemove = [];
                scene.traverse((child) => {
                    if (child.name === 'ModelPayload') toRemove.push(child);
                });
                toRemove.forEach(c => scene.remove(c));
                
                const model = gltf.scene;
                model.name = 'ModelPayload';
                
                // Enhance visibility
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material) {
                            child.material.metalness = 0.1;
                            child.material.roughness = 0.8;
                        }
                    }
                });

                // Center and scale model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                model.position.x -= center.x;
                model.position.y -= center.y;
                model.position.z -= center.z;
                
                scene.add(model);
                
                // Grid Helper for reference
                const gridHelper = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
                gridHelper.position.y = -size.y / 2;
                gridHelper.name = 'ModelPayload';
                scene.add(gridHelper);
                
                // Adjust camera
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 2.0; // Zoom out a bit
                
                camera.position.set(maxDim, maxDim, cameraZ);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                controls.update();

                document.getElementById('loading').style.display = 'none';
            }, 
            (xhr) => {
                if (xhr.total > 0) {
                    const percent = Math.round(xhr.loaded / xhr.total * 100);
                    document.getElementById('loading').innerText = 'Loading: ' + percent + '%';
                }
            },
            (error) => {
                console.error("Loader error:", error);
                document.getElementById('loading').innerText = 'Error loading 3D model';
            });
        }

        // Flet communication
        window.addEventListener('message', (event) => {
            if (event.data && typeof event.data === 'string') {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'load') {
                        loadModel(data.url);
                    }
                } catch(e) {}
            }
        });

        // URL parameter support
        const urlParams = new URLSearchParams(window.location.search);
        const modelUrl = urlParams.get('model');
        if (modelUrl) {
            loadModel(modelUrl);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
